<svg xmlns="http://www.w3.org/2000/svg" width="200" height="60" viewBox="0 0 200 60">
  <!-- Toggle Switch: Off and On -->

  <!-- OFF state -->
  <text x="0" y="14" font-family="Inter, sans-serif" font-size="12" fill="#718096">Equipment Issue?</text>
  <rect x="0" y="22" width="48" height="28" rx="14" fill="#CBD5E0"/>
  <circle cx="14" cy="36" r="11" fill="#FFFFFF"/>
  <text x="58" y="41" font-family="Inter, sans-serif" font-size="14" fill="#718096">No</text>

  <!-- ON state -->
  <text x="110" y="14" font-family="Inter, sans-serif" font-size="12" fill="#718096">Equipment Issue?</text>
  <rect x="110" y="22" width="48" height="28" rx="14" fill="#6BCB77"/>
  <circle cx="144" cy="36" r="11" fill="#FFFFFF"/>
  <text x="168" y="41" font-family="Inter, sans-serif" font-size="14" fill="#2D6A4F">Yes</text>
</svg>
