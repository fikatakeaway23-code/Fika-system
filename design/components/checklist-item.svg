<svg xmlns="http://www.w3.org/2000/svg" width="327" height="120" viewBox="0 0 327 120">
  <!-- Checklist Items: Unchecked + Checked -->

  <!-- Label -->
  <text x="0" y="14" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#718096" letter-spacing="0.05em">UNCHECKED</text>
  <!-- Unchecked item -->
  <rect y="22" width="327" height="44" rx="8" fill="#F7F9F7"/>
  <rect x="12" y="36" width="20" height="20" rx="5" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="2"/>
  <text x="44" y="52" font-family="Inter, sans-serif" font-size="15" fill="#1A202C">Wipe down espresso machine</text>

  <!-- Label -->
  <text x="0" y="84" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#718096" letter-spacing="0.05em">CHECKED</text>
  <!-- Checked item -->
  <rect y="92" width="327" height="44" rx="8" fill="#F0FBF1"/>
  <rect x="12" y="106" width="20" height="20" rx="5" fill="#6BCB77"/>
  <!-- Checkmark -->
  <polyline points="16,116 20,121 28,112" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="44" y="122" font-family="Inter, sans-serif" font-size="15" fill="#4A5568" text-decoration="line-through">Wipe down espresso machine</text>
</svg>
