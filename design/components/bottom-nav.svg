<svg xmlns="http://www.w3.org/2000/svg" width="375" height="64" viewBox="0 0 375 64">
  <!-- Bottom Navigation Bar -->
  <rect width="375" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1" stroke-dasharray="0"/>
  <!-- Active indicator top line -->
  <rect x="28" y="0" width="38" height="3" rx="2" fill="#6BCB77"/>

  <!-- Home (active) -->
  <g transform="translate(28,10)">
    <!-- House icon -->
    <path d="M19 0 L38 16 L32 16 L32 30 L6 30 L6 16 L0 16 Z" fill="none" stroke="#6BCB77" stroke-width="2" stroke-linejoin="round"/>
    <rect x="14" y="18" width="10" height="12" rx="1" fill="#6BCB77" opacity="0.3"/>
    <text x="19" y="50" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#6BCB77" text-anchor="middle">Home</text>
  </g>

  <!-- Checklist -->
  <g transform="translate(122,10)">
    <rect x="4" y="2" width="24" height="26" rx="4" fill="none" stroke="#718096" stroke-width="2"/>
    <line x1="10" y1="11" x2="22" y2="11" stroke="#718096" stroke-width="1.5"/>
    <line x1="10" y1="17" x2="22" y2="17" stroke="#718096" stroke-width="1.5"/>
    <line x1="10" y1="23" x2="18" y2="23" stroke="#718096" stroke-width="1.5"/>
    <text x="16" y="50" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Shift</text>
  </g>

  <!-- Expenses -->
  <g transform="translate(216,10)">
    <circle cx="16" cy="14" r="12" fill="none" stroke="#718096" stroke-width="2"/>
    <text x="16" y="19" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#718096" text-anchor="middle">₨</text>
    <text x="16" y="50" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Expenses</text>
  </g>

  <!-- Profile -->
  <g transform="translate(310,10)">
    <circle cx="16" cy="10" r="8" fill="none" stroke="#718096" stroke-width="2"/>
    <path d="M2 28 Q2 20 16 20 Q30 20 30 28" fill="none" stroke="#718096" stroke-width="2"/>
    <text x="16" y="50" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Profile</text>
  </g>
</svg>
