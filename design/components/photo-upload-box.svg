<svg xmlns="http://www.w3.org/2000/svg" width="327" height="120" viewBox="0 0 327 120">
  <!-- Photo Upload Box -->
  <rect width="327" height="120" rx="12" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- Camera icon -->
  <rect x="140" y="28" width="47" height="38" rx="6" fill="none" stroke="#718096" stroke-width="2"/>
  <circle cx="163" cy="47" r="10" fill="none" stroke="#718096" stroke-width="2"/>
  <circle cx="163" cy="47" r="5" fill="#718096"/>
  <rect x="152" y="24" width="22" height="8" rx="4" fill="none" stroke="#718096" stroke-width="2"/>
  <!-- Text -->
  <text x="163" y="84" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#2D6A4F" text-anchor="middle">Tap to upload photo</text>
  <text x="163" y="104" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="middle">Opening / Closing station photo</text>
