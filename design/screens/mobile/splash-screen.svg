<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Splash Screen -->
  <rect width="375" height="812" fill="#6BCB77"/>
  <!-- Logo area -->
  <!-- Coffee cup SVG icon -->
  <g transform="translate(147,280)">
    <!-- Cup body -->
    <path d="M10 20 L72 20 L60 70 L22 70 Z" fill="#FFFFFF" opacity="0.9"/>
    <!-- Cup rim -->
    <rect x="6" y="14" width="70" height="10" rx="5" fill="#FFFFFF"/>
    <!-- Handle -->
    <path d="M72 30 Q92 30 92 45 Q92 60 72 60" fill="none" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <!-- Steam lines -->
    <path d="M30 10 Q33 4 30 0" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M41 10 Q44 4 41 0" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
    <path d="M52 10 Q55 4 52 0" fill="none" stroke="#FFFFFF" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- FIKA text -->
  <text x="188" y="420" font-family="Inter, sans-serif" font-size="52" font-weight="800" fill="#2D6A4F" text-anchor="middle" letter-spacing="0.05em">FIKA</text>
  <!-- Tagline -->
  <text x="188" y="456" font-family="Inter, sans-serif" font-size="16" fill="#FFFFFF" text-anchor="middle" opacity="0.9">Fast · Fresh · Consistent · Friendly</text>
  <!-- Loading indicator -->
  <circle cx="188" cy="680" r="6" fill="#FFFFFF" opacity="0.9"/>
  <circle cx="208" cy="680" r="6" fill="#FFFFFF" opacity="0.5"/>
  <circle cx="228" cy="680" r="6" fill="#FFFFFF" opacity="0.3"/>
</svg>
