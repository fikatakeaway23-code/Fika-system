<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Membership Detail Screen -->
  <rect width="375" height="812" fill="#FFFFFF"/>
  <text x="20" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">9:41</text>
  <polyline points="36,60 24,68 36,76" fill="none" stroke="#1A202C" stroke-width="2.5" stroke-linecap="round"/>
  <text x="188" y="72" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1A202C" text-anchor="middle">Client Details</text>

  <!-- Client header -->
  <rect x="0" y="88" width="375" height="100" fill="#2D6A4F"/>
  <circle cx="60" cy="138" r="32" fill="#6BCB77"/>
  <text x="60" y="144" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">KC</text>
  <text x="108" y="122" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Kathmandu Corp</text>
  <text x="108" y="144" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.8">Team Pack · 5 staff</text>
  <rect x="108" y="154" width="70" height="22" rx="11" fill="#6BCB77"/>
  <text x="143" y="169" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">Active</text>

  <!-- Drinks counter -->
  <rect x="24" y="204" width="327" height="80" rx="16" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="188" y="228" font-family="Inter, sans-serif" font-size="13" fill="#718096" text-anchor="middle">Drinks Used This Month</text>
  <rect x="100" y="240" width="36" height="36" rx="8" fill="#E2E8F0"/>
  <text x="118" y="263" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#718096" text-anchor="middle">−</text>
  <text x="188" y="270" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#1A202C" text-anchor="middle">18</text>
  <text x="188" y="290" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="middle">of 30</text>
  <rect x="239" y="240" width="36" height="36" rx="8" fill="#6BCB77"/>
  <text x="257" y="263" font-family="Inter, sans-serif" font-size="20" font-weight="600" fill="#FFFFFF" text-anchor="middle">+</text>

  <!-- Details -->
  <text x="24" y="316" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">CONTACT</text>
  <rect x="24" y="324" width="327" height="44" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="351" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">Ramesh Shrestha · +977 98XXXXXXXX</text>

  <text x="24" y="388" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">PAYMENT STATUS</text>
  <rect x="24" y="396" width="327" height="44" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="423" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">Paid — May 1</text>
  <polyline points="319,414 327,422 335,414" fill="none" stroke="#718096" stroke-width="2" stroke-linecap="round"/>

  <text x="24" y="460" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">USUAL ORDER</text>
  <rect x="24" y="468" width="327" height="44" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="495" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">Iced Latte, Cappuccino</text>

  <!-- Renewal date -->
  <rect x="24" y="532" width="327" height="56" rx="12" fill="#F0FBF1" stroke="#6BCB77" stroke-width="1.5"/>
  <text x="40" y="556" font-family="Inter, sans-serif" font-size="13" fill="#2D6A4F">Renewal Date</text>
  <text x="40" y="578" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#1A202C">May 1, 2026 · NPR 8,000</text>

  <rect x="24" y="608" width="327" height="52" rx="14" fill="#6BCB77"/>
  <text x="188" y="639" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Save Changes</text>

  <!-- Bottom nav -->
  <rect x="0" y="748" width="375" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
</svg>
