<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Shift Form: Step 4 — Cash Log -->
  <rect width="375" height="812" fill="#FFFFFF"/>
  <text x="20" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">9:41</text>

  <!-- Header -->
  <polyline points="36,60 24,68 36,76" fill="none" stroke="#1A202C" stroke-width="2.5" stroke-linecap="round"/>
  <text x="188" y="72" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#1A202C" text-anchor="middle">Cash Log</text>

  <!-- Progress -->
  <text x="24" y="104" font-family="Inter, sans-serif" font-size="13" fill="#718096">Step 4 of 7</text>
  <text x="351" y="104" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#2D6A4F" text-anchor="end">Cash Log</text>
  <rect x="24" y="112" width="327" height="6" rx="3" fill="#E2E8F0"/>
  <rect x="24" y="112" width="187" height="6" rx="3" fill="#6BCB77"/>

  <!-- Opening float -->
  <text x="24" y="144" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">OPENING FLOAT (NPR)</text>
  <rect x="24" y="152" width="327" height="48" rx="8" fill="#F0FBF1" stroke="#6BCB77" stroke-width="2"/>
  <text x="40" y="181" font-family="Inter, sans-serif" font-size="16" fill="#1A202C">1,500</text>

  <!-- Cash sales -->
  <text x="24" y="224" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">CASH SALES (NPR)</text>
  <rect x="24" y="232" width="327" height="48" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="261" font-family="Inter, sans-serif" font-size="16" fill="#1A202C">8,200</text>

  <!-- Digital/QR sales -->
  <text x="24" y="304" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">DIGITAL / QR SALES (NPR)</text>
  <rect x="24" y="312" width="327" height="48" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="341" font-family="Inter, sans-serif" font-size="16" fill="#1A202C">4,800</text>

  <!-- Closing cash -->
  <text x="24" y="384" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">CLOSING CASH IN DRAWER (NPR)</text>
  <rect x="24" y="392" width="327" height="48" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="421" font-family="Inter, sans-serif" font-size="16" fill="#718096">Enter amount...</text>

  <!-- Live calculation card -->
  <rect x="24" y="460" width="327" height="108" rx="12" fill="#F0FBF1" stroke="#6BCB77" stroke-width="1.5"/>
  <text x="40" y="484" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#2D6A4F">Live Calculation</text>
  <line x1="40" y1="492" x2="335" y2="492" stroke="#6BCB77" stroke-width="1" opacity="0.4"/>
  <text x="40" y="514" font-family="Inter, sans-serif" font-size="13" fill="#1A202C">Expected in drawer:</text>
  <text x="335" y="514" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C" text-anchor="end">NPR 9,700</text>
  <text x="40" y="538" font-family="Inter, sans-serif" font-size="13" fill="#1A202C">Actual (closing cash):</text>
  <text x="335" y="538" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#718096" text-anchor="end">—</text>
  <text x="40" y="558" font-family="Inter, sans-serif" font-size="13" fill="#1A202C">Difference:</text>
  <text x="335" y="558" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#718096" text-anchor="end">—</text>

  <!-- Next button -->
  <rect x="24" y="592" width="327" height="56" rx="14" fill="#6BCB77"/>
  <text x="188" y="625" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Next: Waste Log →</text>

  <!-- Bottom nav -->
  <rect x="0" y="748" width="375" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
