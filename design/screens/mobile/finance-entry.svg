<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Finance Entry Screen -->
  <rect width="375" height="812" fill="#FFFFFF"/>
  <text x="20" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">9:41</text>
  <text x="188" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#1A202C" text-anchor="middle">Finance Entry</text>
  <text x="188" y="100" font-family="Inter, sans-serif" font-size="14" fill="#718096" text-anchor="middle">April 12, 2026</text>

  <!-- POS Total -->
  <text x="24" y="132" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">POS TOTAL (NPR)</text>
  <rect x="24" y="140" width="327" height="48" rx="8" fill="#F7F9F7" stroke="#6BCB77" stroke-width="2"/>
  <text x="40" y="169" font-family="Inter, sans-serif" font-size="16" fill="#1A202C">13,200</text>

  <!-- Expenses section -->
  <text x="24" y="210" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1A202C">Operating Expenses</text>

  <text x="24" y="238" font-family="Inter, sans-serif" font-size="12" fill="#718096">Rent (monthly)</text>
  <rect x="24" y="246" width="327" height="44" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="273" font-family="Inter, sans-serif" font-size="15" fill="#1A202C">45,000</text>

  <text x="24" y="306" font-family="Inter, sans-serif" font-size="12" fill="#718096">Barista 1 Salary</text>
  <rect x="24" y="314" width="153" height="44" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="341" font-family="Inter, sans-serif" font-size="15" fill="#1A202C">25,000</text>

  <text x="197" y="306" font-family="Inter, sans-serif" font-size="12" fill="#718096">Barista 2 Salary</text>
  <rect x="197" y="314" width="154" height="44" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="213" y="341" font-family="Inter, sans-serif" font-size="15" fill="#1A202C">25,000</text>

  <text x="24" y="374" font-family="Inter, sans-serif" font-size="12" fill="#718096">Milk Bill</text>
  <rect x="24" y="382" width="153" height="44" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="409" font-family="Inter, sans-serif" font-size="15" fill="#718096">0</text>

  <text x="197" y="374" font-family="Inter, sans-serif" font-size="12" fill="#718096">Bakery Bill</text>
  <rect x="197" y="382" width="154" height="44" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="213" y="409" font-family="Inter, sans-serif" font-size="15" fill="#718096">0</text>

  <!-- Auto net profit -->
  <rect x="24" y="444" width="327" height="72" rx="12" fill="#F0FBF1" stroke="#6BCB77" stroke-width="1.5"/>
  <text x="40" y="468" font-family="Inter, sans-serif" font-size="13" fill="#2D6A4F">Auto-calculated Net Profit</text>
  <text x="40" y="500" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#2D6A4F">NPR — (fill expenses)</text>

  <!-- Save button -->
  <rect x="24" y="540" width="327" height="56" rx="14" fill="#6BCB77"/>
  <text x="188" y="573" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Save Finance Record</text>

  <!-- Bottom nav -->
  <rect x="0" y="748" width="375" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
</svg>
