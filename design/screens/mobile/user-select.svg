<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- User Select Screen -->
  <rect width="375" height="812" fill="#FFFFFF"/>
  <!-- Status bar -->
  <rect width="375" height="44" fill="#FFFFFF"/>
  <text x="20" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">9:41</text>
  <!-- Header -->
  <text x="188" y="100" font-family="Inter, sans-serif" font-size="28" font-weight="700" fill="#1A202C" text-anchor="middle">Who's working?</text>
  <text x="188" y="128" font-family="Inter, sans-serif" font-size="15" fill="#718096" text-anchor="middle">Select your profile to continue</text>

  <!-- Barista 1 Card -->
  <rect x="24" y="164" width="327" height="136" rx="16" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="72" cy="232" r="28" fill="#6BCB77"/>
  <text x="72" y="238" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">B1</text>
  <text x="116" y="220" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1A202C">Barista 1</text>
  <text x="116" y="242" font-family="Inter, sans-serif" font-size="14" fill="#718096">Morning Shift</text>
  <rect x="116" y="256" width="80" height="24" rx="12" fill="#C6F6D5"/>
  <text x="156" y="272" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#276749" text-anchor="middle">6AM – 2PM</text>

  <!-- Barista 2 Card -->
  <rect x="24" y="316" width="327" height="136" rx="16" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <circle cx="72" cy="384" r="28" fill="#6BCB77"/>
  <text x="72" y="390" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">B2</text>
  <text x="116" y="372" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#1A202C">Barista 2</text>
  <text x="116" y="394" font-family="Inter, sans-serif" font-size="14" fill="#718096">Afternoon Shift</text>
  <rect x="116" y="408" width="88" height="24" rx="12" fill="#C6F6D5"/>
  <text x="160" y="424" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#276749" text-anchor="middle">12PM – 8PM</text>

  <!-- Owner Card -->
  <rect x="24" y="468" width="327" height="136" rx="16" fill="#2D6A4F"/>
  <circle cx="72" cy="536" r="28" fill="#FFFFFF" opacity="0.2"/>
  <text x="72" y="542" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF" text-anchor="middle">OW</text>
  <text x="116" y="524" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#FFFFFF">Owner</text>
  <text x="116" y="546" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">Full Access</text>
  <rect x="116" y="560" width="88" height="24" rx="12" fill="#FFFFFF" opacity="0.2"/>
  <text x="160" y="576" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">All Hours</text>

  <!-- Dillibazar footer -->
  <text x="188" y="760" font-family="Inter, sans-serif" font-size="13" fill="#718096" text-anchor="middle">📍 Dillibazar, Kathmandu</text>
</svg>
