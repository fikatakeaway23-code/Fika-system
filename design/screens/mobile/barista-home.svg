<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Barista Home Screen -->
  <rect width="375" height="812" fill="#F7F9F7"/>
  <!-- Status bar -->
  <rect width="375" height="44" fill="#FFFFFF"/>
  <text x="20" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">9:41</text>
  <!-- Network dot green -->
  <circle cx="350" cy="22" r="5" fill="#6BCB77"/>

  <!-- Header -->
  <rect x="0" y="44" width="375" height="88" fill="#FFFFFF"/>
  <text x="24" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#1A202C">Good morning,</text>
  <text x="24" y="104" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#2D6A4F">Barista 1 ☕</text>
  <text x="327" y="80" font-family="Inter, sans-serif" font-size="13" fill="#718096" text-anchor="end">Sat, Apr 12</text>

  <!-- Shift badge -->
  <rect x="24" y="148" width="88" height="26" rx="13" fill="#C6F6D5"/>
  <text x="68" y="165" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#276749" text-anchor="middle">AM Shift</text>

  <!-- Status card -->
  <rect x="24" y="188" width="327" height="100" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="220" font-family="Inter, sans-serif" font-size="14" fill="#718096">Today's Shift Status</text>
  <rect x="40" y="232" width="100" height="24" rx="12" fill="#FEEBC8"/>
  <text x="90" y="248" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#C05621" text-anchor="middle">Not Started</text>
  <text x="40" y="276" font-family="Inter, sans-serif" font-size="13" fill="#718096">6:00 AM – 2:00 PM</text>

  <!-- Start shift button -->
  <rect x="24" y="308" width="327" height="56" rx="14" fill="#6BCB77"/>
  <text x="188" y="341" font-family="Inter, sans-serif" font-size="17" font-weight="600" fill="#FFFFFF" text-anchor="middle">Start Shift</text>

  <!-- Quick actions -->
  <text x="24" y="390" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1A202C">Quick Actions</text>

  <rect x="24" y="406" width="153" height="80" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="100" y="440" font-family="Inter, sans-serif" font-size="24" text-anchor="middle">💸</text>
  <text x="100" y="470" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C" text-anchor="middle">Log Expense</text>

  <rect x="197" y="406" width="154" height="80" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="274" y="440" font-family="Inter, sans-serif" font-size="24" text-anchor="middle">📋</text>
  <text x="274" y="470" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C" text-anchor="middle">View Checklist</text>

  <!-- Notification banner -->
  <rect x="24" y="508" width="327" height="52" rx="10" fill="#F0FFF4" stroke="#6BCB77" stroke-width="1.5"/>
  <rect x="24" y="508" width="4" height="52" rx="2" fill="#6BCB77"/>
  <text x="40" y="528" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#276749">Reminder: Espresso dial-in at 6AM</text>
  <text x="40" y="548" font-family="Inter, sans-serif" font-size="12" fill="#22543D">Log your dose, yield and extraction time</text>

  <!-- Bottom nav -->
  <rect x="0" y="748" width="375" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="28" y="748" width="38" height="3" rx="2" fill="#6BCB77"/>
  <text x="47" y="800" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#6BCB77" text-anchor="middle">Home</text>
  <text x="141" y="800" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Shift</text>
  <text x="235" y="800" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Expenses</text>
  <text x="329" y="800" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Profile</text>
</svg>
