<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- HR Records Screen -->
  <rect width="375" height="812" fill="#F7F9F7"/>
  <text x="20" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">9:41</text>
  <text x="188" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#1A202C" text-anchor="middle">HR Records</text>

  <!-- Tab bar -->
  <rect x="24" y="96" width="327" height="44" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="28" y="100" width="56" height="36" rx="8" fill="#6BCB77"/>
  <text x="56" y="122" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" text-anchor="middle">Attend.</text>
  <text x="130" y="122" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="middle">Leave</text>
  <text x="200" y="122" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="middle">Incidents</text>
  <text x="272" y="122" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="middle">Salary</text>
  <text x="336" y="122" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="middle">Perf.</text>

  <!-- Staff filter -->
  <text x="24" y="164" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">STAFF MEMBER</text>
  <rect x="24" y="172" width="327" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="197" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">All Staff</text>
  <polyline points="319,188 327,196 335,188" fill="none" stroke="#718096" stroke-width="2" stroke-linecap="round"/>

  <!-- Attendance records -->
  <rect x="24" y="228" width="327" height="76" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="252" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1A202C">Barista 1 · Apr 12</text>
  <rect x="40" y="260" width="64" height="22" rx="11" fill="#C6F6D5"/>
  <text x="72" y="275" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#276749" text-anchor="middle">On Time</text>
  <text x="335" y="268" font-family="Inter, sans-serif" font-size="13" fill="#718096" text-anchor="end">6:02 AM</text>
  <text x="335" y="288" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="end">2 min early</text>

  <rect x="24" y="316" width="327" height="76" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="340" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1A202C">Barista 2 · Apr 12</text>
  <rect x="40" y="348" width="64" height="22" rx="11" fill="#FEEBC8"/>
  <text x="72" y="363" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#C05621" text-anchor="middle">Late</text>
  <text x="335" y="356" font-family="Inter, sans-serif" font-size="13" fill="#E53E3E" text-anchor="end">12:18 PM</text>
  <text x="335" y="376" font-family="Inter, sans-serif" font-size="12" fill="#718096" text-anchor="end">18 min late</text>

  <rect x="24" y="404" width="327" height="76" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="428" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1A202C">Barista 1 · Apr 11</text>
  <rect x="40" y="436" width="64" height="22" rx="11" fill="#C6F6D5"/>
  <text x="72" y="451" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#276749" text-anchor="middle">On Time</text>
  <text x="335" y="444" font-family="Inter, sans-serif" font-size="13" fill="#718096" text-anchor="end">5:58 AM</text>

  <!-- Add record FAB -->
  <circle cx="327" cy="700" r="28" fill="#6BCB77"/>
  <text x="327" y="707" font-family="Inter, sans-serif" font-size="28" font-weight="300" fill="#FFFFFF" text-anchor="middle">+</text>

  <!-- Bottom nav -->
  <rect x="0" y="748" width="375" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
</svg>
