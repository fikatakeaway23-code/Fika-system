<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Settings Screen (Owner) -->
  <rect width="375" height="812" fill="#F7F9F7"/>
  <text x="20" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">9:41</text>

  <text x="188" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#1A202C" text-anchor="middle">Settings</text>

  <!-- Section: Change PINs -->
  <text x="24" y="116" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">CHANGE PINs</text>

  <rect x="24" y="124" width="327" height="52" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="154" font-family="Inter, sans-serif" font-size="15" fill="#1A202C">Barista 1 PIN</text>
  <text x="335" y="154" font-family="Inter, sans-serif" font-size="14" fill="#2D6A4F" text-anchor="end">Change →</text>

  <rect x="24" y="184" width="327" height="52" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="214" font-family="Inter, sans-serif" font-size="15" fill="#1A202C">Barista 2 PIN</text>
  <text x="335" y="214" font-family="Inter, sans-serif" font-size="14" fill="#2D6A4F" text-anchor="end">Change →</text>

  <rect x="24" y="244" width="327" height="52" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="274" font-family="Inter, sans-serif" font-size="15" fill="#1A202C">Owner PIN</text>
  <text x="335" y="274" font-family="Inter, sans-serif" font-size="14" fill="#2D6A4F" text-anchor="end">Change →</text>

  <!-- Section: Notion -->
  <text x="24" y="320" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">NOTION INTEGRATION</text>

  <rect x="24" y="328" width="327" height="52" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="348" font-family="Inter, sans-serif" font-size="12" fill="#718096">API Token</text>
  <text x="40" y="368" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">ntn_••••••••••••</text>
  <text x="335" y="358" font-family="Inter, sans-serif" font-size="14" fill="#2D6A4F" text-anchor="end">Edit →</text>

  <!-- Sync all button -->
  <rect x="24" y="392" width="327" height="52" rx="10" fill="#2D6A4F"/>
  <text x="188" y="422" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">↑ Sync All to Notion</text>

  <!-- Sync log -->
  <rect x="24" y="460" width="327" height="120" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="482" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">Sync Log</text>
  <text x="40" y="504" font-family="Inter, sans-serif" font-size="12" fill="#6BCB77">✓ Shifts synced — Apr 12, 9:30 AM</text>
  <text x="40" y="524" font-family="Inter, sans-serif" font-size="12" fill="#6BCB77">✓ Finance synced — Apr 11, 8:15 PM</text>
  <text x="40" y="544" font-family="Inter, sans-serif" font-size="12" fill="#E53E3E">✗ HR sync failed — Apr 10</text>
  <text x="40" y="564" font-family="Inter, sans-serif" font-size="11" fill="#718096">Last sync: Apr 12 at 9:30 AM</text>

  <!-- App info -->
  <text x="24" y="620" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096" letter-spacing="0.05em">APP INFO</text>
  <rect x="24" y="628" width="327" height="52" rx="10" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="658" font-family="Inter, sans-serif" font-size="15" fill="#718096">Version 1.0.0 · Fika Takeaway</text>

  <!-- Bottom nav -->
  <rect x="0" y="748" width="375" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <rect x="304" y="748" width="42" height="3" rx="2" fill="#6BCB77"/>
  <text x="44" y="800" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Dashboard</text>
  <text x="138" y="800" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Shifts</text>
  <text x="235" y="800" font-family="Inter, sans-serif" font-size="10" fill="#718096" text-anchor="middle">Finance</text>
  <text x="325" y="800" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#6BCB77" text-anchor="middle">More</text>
</svg>
