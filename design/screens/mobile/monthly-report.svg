<svg xmlns="http://www.w3.org/2000/svg" width="375" height="812" viewBox="0 0 375 812">
  <!-- Monthly Report Screen -->
  <rect width="375" height="812" fill="#F7F9F7"/>
  <text x="20" y="28" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#1A202C">9:41</text>

  <text x="188" y="80" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#1A202C" text-anchor="middle">Monthly Report</text>

  <!-- Month picker -->
  <rect x="24" y="100" width="327" height="44" rx="22" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="44" y="127" font-family="Inter, sans-serif" font-size="14" fill="#718096">◀</text>
  <text x="188" y="127" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#1A202C" text-anchor="middle">April 2026</text>
  <text x="335" y="127" font-family="Inter, sans-serif" font-size="14" fill="#718096" text-anchor="end">▶</text>

  <!-- Revenue metric -->
  <rect x="24" y="160" width="327" height="80" rx="16" fill="#2D6A4F"/>
  <text x="40" y="188" font-family="Inter, sans-serif" font-size="13" fill="#FFFFFF" opacity="0.8">Total Revenue</text>
  <text x="40" y="222" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF">NPR 3,24,500</text>

  <!-- Metric cards 2x2 -->
  <rect x="24" y="256" width="153" height="88" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="278" font-family="Inter, sans-serif" font-size="12" fill="#718096">Total Expenses</text>
  <text x="40" y="306" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#E53E3E">₨2,40,200</text>
  <text x="40" y="330" font-family="Inter, sans-serif" font-size="11" fill="#718096">Apr 2026</text>

  <rect x="197" y="256" width="154" height="88" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="213" y="278" font-family="Inter, sans-serif" font-size="12" fill="#718096">Net Profit</text>
  <text x="213" y="306" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#2D6A4F">₨84,300</text>
  <text x="213" y="330" font-family="Inter, sans-serif" font-size="11" fill="#6BCB77">Margin: 26%</text>

  <rect x="24" y="356" width="153" height="88" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="378" font-family="Inter, sans-serif" font-size="12" fill="#718096">Drinks Sold</text>
  <text x="40" y="406" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="#1A202C">1,284</text>
  <text x="40" y="430" font-family="Inter, sans-serif" font-size="11" fill="#718096">This month</text>

  <rect x="197" y="356" width="154" height="88" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="213" y="378" font-family="Inter, sans-serif" font-size="12" fill="#718096">Top Drink</text>
  <text x="213" y="406" font-family="Inter, sans-serif" font-size="17" font-weight="700" fill="#1A202C">Iced Latte</text>
  <text x="213" y="430" font-family="Inter, sans-serif" font-size="11" fill="#718096">312 sold</text>

  <!-- Chart placeholder -->
  <rect x="24" y="460" width="327" height="160" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="40" y="484" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#1A202C">Daily Revenue</text>
  <!-- Bar chart bars -->
  <rect x="40" y="560" width="16" height="48" rx="4" fill="#6BCB77" opacity="0.6"/>
  <rect x="64" y="540" width="16" height="68" rx="4" fill="#6BCB77" opacity="0.7"/>
  <rect x="88" y="530" width="16" height="78" rx="4" fill="#6BCB77" opacity="0.8"/>
  <rect x="112" y="520" width="16" height="88" rx="4" fill="#6BCB77"/>
  <rect x="136" y="545" width="16" height="63" rx="4" fill="#6BCB77" opacity="0.7"/>
  <rect x="160" y="535" width="16" height="73" rx="4" fill="#6BCB77" opacity="0.8"/>
  <rect x="184" y="510" width="16" height="98" rx="4" fill="#2D6A4F"/>
  <rect x="208" y="525" width="16" height="83" rx="4" fill="#6BCB77" opacity="0.8"/>
  <rect x="232" y="540" width="16" height="68" rx="4" fill="#6BCB77" opacity="0.7"/>
  <rect x="256" y="515" width="16" height="93" rx="4" fill="#6BCB77"/>
  <rect x="280" y="530" width="16" height="78" rx="4" fill="#6BCB77" opacity="0.8"/>
  <rect x="304" y="548" width="16" height="60" rx="4" fill="#6BCB77" opacity="0.6"/>

  <!-- Notion sync button -->
  <rect x="24" y="640" width="327" height="52" rx="14" fill="#F7F9F7" stroke="#2D6A4F" stroke-width="2"/>
  <text x="188" y="671" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#2D6A4F" text-anchor="middle">↑ Sync to Notion</text>

  <!-- Bottom nav -->
  <rect x="0" y="748" width="375" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
</svg>
