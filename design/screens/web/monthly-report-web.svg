<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <!-- Monthly Report Web Screen -->
  <rect width="1280" height="900" fill="#F7F9F7"/>

  <!-- Sidebar -->
  <rect width="240" height="900" fill="#2D6A4F"/>
  <text x="32" y="52" font-family="Inter, sans-serif" font-size="24" font-weight="800" fill="#FFFFFF">FIKA</text>
  <text x="32" y="72" font-family="Inter, sans-serif" font-size="11" fill="#FFFFFF" opacity="0.6">Staff Operations</text>
  <text x="48" y="130" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">📊  Dashboard</text>
  <text x="48" y="178" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">📋  Shifts</text>
  <text x="48" y="226" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">💰  Finance</text>
  <text x="48" y="274" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">💸  Expenses</text>
  <text x="48" y="322" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">🏢  Memberships</text>
  <text x="48" y="370" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">👥  HR Records</text>
  <rect x="12" y="392" width="216" height="44" rx="8" fill="#FFFFFF" opacity="0.15"/>
  <text x="48" y="418" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFFFFF">📈  Reports</text>
  <text x="48" y="466" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7">⚙  Settings</text>

  <!-- Header -->
  <rect x="240" y="0" width="1040" height="64" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1"/>
  <text x="264" y="36" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#1A202C">Monthly Report</text>

  <!-- Month picker -->
  <rect x="900" y="16" width="180" height="36" rx="8" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="920" y="38" font-family="Inter, sans-serif" font-size="14" fill="#718096">◀</text>
  <text x="990" y="38" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1A202C" text-anchor="middle">April 2026</text>
  <text x="1064" y="38" font-family="Inter, sans-serif" font-size="14" fill="#718096" text-anchor="end">▶</text>

  <!-- KPI strip -->
  <rect x="264" y="80" width="232" height="88" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="284" y="108" font-family="Inter, sans-serif" font-size="12" fill="#718096">Total Revenue</text>
  <text x="284" y="142" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#1A202C">₨3,24,500</text>
  <text x="284" y="162" font-family="Inter, sans-serif" font-size="12" fill="#6BCB77">↑ 11% vs March</text>

  <rect x="516" y="80" width="232" height="88" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="536" y="108" font-family="Inter, sans-serif" font-size="12" fill="#718096">Total Expenses</text>
  <text x="536" y="142" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#E53E3E">₨2,40,200</text>
  <text x="536" y="162" font-family="Inter, sans-serif" font-size="12" fill="#718096">All categories</text>

  <rect x="768" y="80" width="232" height="88" rx="12" fill="#2D6A4F"/>
  <text x="788" y="108" font-family="Inter, sans-serif" font-size="12" fill="#FFFFFF" opacity="0.8">Net Profit</text>
  <text x="788" y="142" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#FFFFFF">₨84,300</text>
  <text x="788" y="162" font-family="Inter, sans-serif" font-size="12" fill="#6BCB77">Margin: 26%</text>

  <rect x="1020" y="80" width="236" height="88" rx="12" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="1040" y="108" font-family="Inter, sans-serif" font-size="12" fill="#718096">Drinks Sold</text>
  <text x="1040" y="142" font-family="Inter, sans-serif" font-size="26" font-weight="700" fill="#1A202C">1,284</text>
  <text x="1040" y="162" font-family="Inter, sans-serif" font-size="12" fill="#718096">Top: Iced Latte</text>

  <!-- Revenue trend chart -->
  <rect x="264" y="188" width="660" height="280" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="284" y="216" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1A202C">Revenue vs Expenses — April 2026</text>
  <!-- Line chart polylines -->
  <polyline points="300,420 332,390 364,380 396,360 428,375 460,345 492,330 524,355 556,325 588,340 620,360 652,350 684,335 716,355 748,345 780,370 812,350 844,390 876,380" fill="none" stroke="#6BCB77" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="300,440 332,435 364,430 396,428 428,432 460,425 492,420 524,430 556,418 588,424 620,428 652,422 684,416 716,430 748,420 780,434 812,425 844,438 876,430" fill="none" stroke="#E53E3E" stroke-width="2" stroke-dasharray="6 3" stroke-linecap="round"/>
  <!-- Legend -->
  <rect x="900" y="418" width="12" height="3" rx="2" fill="#6BCB77"/>
  <text x="918" y="422" font-family="Inter, sans-serif" font-size="12" fill="#718096">Revenue</text>
  <rect x="900" y="438" width="12" height="3" rx="2" fill="#E53E3E"/>
  <text x="918" y="442" font-family="Inter, sans-serif" font-size="12" fill="#718096">Expenses</text>

  <!-- Drinks by category chart -->
  <rect x="944" y="188" width="312" height="280" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="964" y="216" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1A202C">Drinks by Category</text>
  <!-- Horizontal bar chart -->
  <text x="964" y="252" font-family="Inter, sans-serif" font-size="12" fill="#718096">Iced Coffee</text>
  <rect x="964" y="258" width="200" height="16" rx="4" fill="#6BCB77"/>
  <text x="1170" y="270" font-family="Inter, sans-serif" font-size="11" fill="#718096">312</text>

  <text x="964" y="294" font-family="Inter, sans-serif" font-size="12" fill="#718096">Hot Coffee</text>
  <rect x="964" y="300" width="160" height="16" rx="4" fill="#6BCB77" opacity="0.8"/>
  <text x="1130" y="312" font-family="Inter, sans-serif" font-size="11" fill="#718096">248</text>

  <text x="964" y="336" font-family="Inter, sans-serif" font-size="12" fill="#718096">Flavored</text>
  <rect x="964" y="342" width="128" height="16" rx="4" fill="#6BCB77" opacity="0.6"/>
  <text x="1098" y="354" font-family="Inter, sans-serif" font-size="11" fill="#718096">198</text>

  <text x="964" y="378" font-family="Inter, sans-serif" font-size="12" fill="#718096">Bubble Tea</text>
  <rect x="964" y="384" width="96" height="16" rx="4" fill="#6BCB77" opacity="0.5"/>
  <text x="1066" y="396" font-family="Inter, sans-serif" font-size="11" fill="#718096">148</text>

  <text x="964" y="420" font-family="Inter, sans-serif" font-size="12" fill="#718096">Smoothie</text>
  <rect x="964" y="426" width="72" height="16" rx="4" fill="#6BCB77" opacity="0.4"/>
  <text x="1042" y="438" font-family="Inter, sans-serif" font-size="11" fill="#718096">112</text>

  <text x="964" y="462" font-family="Inter, sans-serif" font-size="12" fill="#718096">Iced Tea</text>
  <rect x="964" y="468" width="176" height="16" rx="4" fill="#2D6A4F" opacity="0.7"/>
  <text x="1146" y="480" font-family="Inter, sans-serif" font-size="11" fill="#718096">266</text>

  <!-- P&L Summary table -->
  <rect x="264" y="488" width="992" height="200" rx="16" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.5"/>
  <text x="284" y="516" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#1A202C">P&amp;L Summary — April 2026</text>
  <rect x="264" y="528" width="992" height="32" fill="#F7F9F7"/>
  <text x="284" y="548" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096">CATEGORY</text>
  <text x="800" y="548" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096">AMOUNT (NPR)</text>
  <text x="1100" y="548" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#718096">% OF REVENUE</text>

  <text x="284" y="582" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">Total Revenue</text>
  <text x="800" y="582" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1A202C">3,24,500</text>
  <text x="1100" y="582" font-family="Inter, sans-serif" font-size="14" fill="#6BCB77">100%</text>

  <text x="284" y="612" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">Rent + Utilities</text>
  <text x="800" y="612" font-family="Inter, sans-serif" font-size="14" fill="#E53E3E">52,000</text>
  <text x="1100" y="612" font-family="Inter, sans-serif" font-size="14" fill="#718096">16%</text>

  <text x="284" y="642" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">Staff Salaries</text>
  <text x="800" y="642" font-family="Inter, sans-serif" font-size="14" fill="#E53E3E">50,000</text>
  <text x="1100" y="642" font-family="Inter, sans-serif" font-size="14" fill="#718096">15.4%</text>

  <line x1="284" y1="658" x2="1236" y2="658" stroke="#E2E8F0" stroke-width="1"/>
  <text x="284" y="682" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#1A202C">Net Profit</text>
  <text x="800" y="682" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#2D6A4F">84,300</text>
  <text x="1100" y="682" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#2D6A4F">26%</text>
</svg>
