  <text x="640" y="176" font-family="Inter, sans-serif" font-size="18" fill="#FFFFFF" opacity="0.8" text-anchor="middle">Premium coffee for your entire team, delivered fresh every day</text>

  <!-- Tier cards -->
  <!-- Tier 1 -->
  <rect x="100" y="248" width="320" height="400" rx="20" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="100" y="248" width="320" height="8" rx="4" fill="#6BCB77"/>
  <text x="260" y="296" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#718096" text-anchor="middle" letter-spacing="0.1em">TIER 1</text>
  <text x="260" y="336" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#1A202C" text-anchor="middle">Daily Pass</text>
  <text x="260" y="392" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#2D6A4F" text-anchor="middle">NPR 3,000</text>
  <text x="260" y="416" font-family="Inter, sans-serif" font-size="14" fill="#718096" text-anchor="middle">per month</text>
  <line x1="120" y1="432" x2="400" y2="432" stroke="#E2E8F0" stroke-width="1"/>
  <text x="130" y="460" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">✓  1 drink/day per person</text>
  <text x="130" y="488" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">✓  Any drink on menu</text>
  <text x="130" y="516" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">✓  Monthly billing</text>
  <text x="130" y="544" font-family="Inter, sans-serif" font-size="14" fill="#718096">✗  No sharing between staff</text>
  <rect x="120" y="580" width="280" height="48" rx="10" fill="#6BCB77"/>
  <text x="260" y="608" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Contact on WhatsApp</text>

  <!-- Tier 2 (highlighted) -->
  <rect x="480" y="228" width="320" height="440" rx="20" fill="#2D6A4F"/>
  <rect x="480" y="228" width="320" height="48" rx="20" fill="#1A4533"/>
  <text x="640" y="258" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#6BCB77" text-anchor="middle" letter-spacing="0.1em">MOST POPULAR</text>
