  <text x="640" y="356" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#FFFFFF" text-anchor="middle">Team Pack</text>
  <text x="640" y="412" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#6BCB77" text-anchor="middle">NPR 8,000</text>
  <text x="640" y="436" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF" opacity="0.7" text-anchor="middle">per month</text>
