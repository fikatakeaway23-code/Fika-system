  <text x="510" y="480" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF">✓  30 drinks/month total</text>
  <text x="510" y="508" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF">✓  Up to 5 staff members</text>
  <text x="510" y="536" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF">✓  Share drinks freely</text>
  <text x="510" y="564" font-family="Inter, sans-serif" font-size="14" fill="#FFFFFF">✓  Monthly billing</text>
  <rect x="500" y="600" width="280" height="48" rx="10" fill="#6BCB77"/>
  <text x="640" y="628" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Contact on WhatsApp</text>

  <!-- Tier 3 -->
  <rect x="860" y="248" width="320" height="400" rx="20" fill="#F7F9F7" stroke="#E2E8F0" stroke-width="1.5"/>
  <rect x="860" y="248" width="320" height="8" rx="4" fill="#2D6A4F"/>
  <text x="1020" y="296" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#718096" text-anchor="middle" letter-spacing="0.1em">TIER 3</text>
  <text x="1020" y="336" font-family="Inter, sans-serif" font-size="26" font-weight="800" fill="#1A202C" text-anchor="middle">Office Bundle</text>
  <text x="1020" y="392" font-family="Inter, sans-serif" font-size="36" font-weight="800" fill="#2D6A4F" text-anchor="middle">NPR 18,000</text>
  <text x="1020" y="416" font-family="Inter, sans-serif" font-size="14" fill="#718096" text-anchor="middle">per month</text>
  <line x1="880" y1="432" x2="1160" y2="432" stroke="#E2E8F0" stroke-width="1"/>
  <text x="890" y="460" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">✓  Unlimited drinks</text>
  <text x="890" y="488" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">✓  Up to 10 staff members</text>
  <text x="890" y="516" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">✓  Priority morning service</text>
  <text x="890" y="544" font-family="Inter, sans-serif" font-size="14" fill="#1A202C">✓  Monthly invoice</text>
  <rect x="880" y="580" width="280" height="48" rx="10" fill="#2D6A4F"/>
  <text x="1020" y="608" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#FFFFFF" text-anchor="middle">Contact on WhatsApp</text>

  <!-- Footer strip -->
  <rect x="0" y="820" width="1280" height="80" fill="#1A202C"/>
  <text x="640" y="865" font-family="Inter, sans-serif" font-size="14" fill="#718096" text-anchor="middle">© 2026 Fika Takeaway · Dillibazar, Kathmandu · @fika.takeaway</text>
</svg>
