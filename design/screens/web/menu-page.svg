  <text x="354" y="522" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#1A202C">Iced Latte</text>
  <text x="354" y="574" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#2D6A4F">NPR 240</text>

